name: 编译 ImmortalWrt 多设备固件

on:
  workflow_dispatch:
    inputs:
      build_device:
        description: '选择要编译的设备 (默认: all 全部编译)'
        required: true
        default: 'all'
        type: choice
        options:
          - 'all | 全部编译'
          - 'n5105 | X86'
          - 'wyse3040 | wyse3040'
          - 'mt7621 | 歌华链'
          - 'r619ac | 竞斗云2.0'
          - 'ax6600 | 雅典娜AX6600'
          - 'jdc_ax1800 | 亚瑟AX1800'

permissions:
  contents: write
  actions: write

jobs:
  # 准备设备矩阵，实现动态选择
  prepare_matrix:
    name: 解析设备参数
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: 生成设备列表
        id: set-matrix
        run: |
          # 格式：ID|中文名
          DEVICES=("n5105|X86" "wyse3040|wyse3040" "mt7621|歌华链" "r619ac|竞斗云2.0" "ax6600|雅典娜AX6600" "jdc_ax1800|亚瑟AX1800")
          
          SELECTED_RAW="${{ github.event.inputs.build_device }}"
          SELECTED="${SELECTED_RAW%% | *}"
          
          JSON="["
          for item in "${DEVICES[@]}"; do
            ID="${item%%|*}"
            NAME="${item##*|}"
            if [ "$SELECTED" == "all" ] || [ "$SELECTED" == "$ID" ]; then
              JSON+="{\"id\":\"$ID\",\"name\":\"$NAME\"},"
            fi
          done
          JSON="${JSON%,}]"
          echo "matrix=$JSON" >> $GITHUB_OUTPUT

  build:
    name: 编译固件 - ${{ matrix.name }}
    needs: prepare_matrix
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare_matrix.outputs.matrix) }}

    env:
      DEVICE: ${{ matrix.id }}
      GO111MODULE: on
      GOPROXY: https://proxy.golang.org,direct

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Go 1.25 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: 清理磁盘空间
        run: |
          docker image prune -f
          sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php /usr/local/lib/android
          sudo apt update
          sudo apt -y purge azure-cli* docker* ghc* zulu* llvm* firefox google* dotnet* powershell* openjdk* mysql* php* mongodb*
          sudo apt -y autoremove --purge
          sudo apt clean

      - name: 安装基础编译依赖
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt update
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            build-essential bzip2 ccache cmake cpio curl device-tree-compiler ecj fakeroot \
            fastjar flex gawk gettext genisoimage gnutls-dev gperf haveged help2man intltool \
            irqbalance jq lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev \
            libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libreadline-dev libssl-dev \
            libtool libyaml-dev libz-dev lrzsz msmtp nano ninja-build p7zip p7zip-full patch \
            pkgconf libpython3-dev python3 python3-pip python3-cryptography python3-docutils \
            python3-ply python3-pyelftools python3-requests qemu-utils quilt re2c rsync scons \
            sharutils squashfs-tools subversion swig texinfo uglifyjs unzip vim wget xmlto \
            zlib1g-dev zstd xxd libpython3.10-dev nodejs yarn gcc-multilib g++-multilib

      - name: 安装特有编译工具
        run: |
          TMP_DIR="$(mktemp -d)"
          pushd "$TMP_DIR"
          
          # 更新 UPX
          UPX_REV="5.0.2"
          curl -fLO "https://github.com/upx/upx/releases/download/v${UPX_REV}/upx-$UPX_REV-amd64_linux.tar.xz"
          tar -Jxf "upx-$UPX_REV-amd64_linux.tar.xz"
          sudo cp -fp "upx-$UPX_REV-amd64_linux/upx" "/usr/bin/upx-ucl"
          sudo ln -svf "/usr/bin/upx-ucl" "/usr/bin/upx"
          
          # 编译 padjffs2
          curl -fLO "https://raw.githubusercontent.com/openwrt/openwrt/main/tools/padjffs2/src/padjffs2.c"
          gcc -Wall -Werror -o "padjffs2" "padjffs2.c"
          strip "padjffs2"
          sudo cp -fp "padjffs2" "/usr/bin/padjffs2"
          
          # 编译 po2lmo
          git clone --filter=blob:none --no-checkout "https://github.com/openwrt/luci.git" "po2lmo"
          cd "po2lmo"
          git config core.sparseCheckout true
          echo "modules/luci-base/src" >> ".git/info/sparse-checkout"
          git checkout
          cd "modules/luci-base/src"
          make po2lmo
          strip "po2lmo"
          sudo cp -fp "po2lmo" "/usr/bin/po2lmo"
          
          popd
          rm -rf "$TMP_DIR"

      - name: 拉取 ImmortalWrt 源码
        run: |
          git clone https://github.com/immortalwrt/immortalwrt.git openwrt
          # 修改默认 IP 为 10.10.10.1
          sed -i 's/192.168.1.1/10.10.10.1/g' openwrt/package/base-files/files/bin/config_generate

      - name: 配置缓存
        uses: actions/cache@v4
        with:
          path: |
            openwrt/.ccache
            openwrt/staging_dir/host*
            openwrt/staging_dir/toolchain-*
          key: ${{ runner.os }}-${{ matrix.id }}-v2-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.id }}-v2-

      - name: 设置 CCache
        run: |
          echo "CCACHE_DIR=$GITHUB_WORKSPACE/openwrt/.ccache" >> $GITHUB_ENV

      - name: 下载缓存
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: dl-${{ hashFiles('configs/*.config') }}
          restore-keys: dl-

      - name: 更新 feeds
        working-directory: openwrt
        run: |
          echo "src-git helloworld https://github.com/fw876/helloworld" >> feeds.conf.default
          echo "src-git passwall2 https://github.com/Openwrt-Passwall/openwrt-passwall2" >> feeds.conf.default
          echo "src-git mosdns https://github.com/sbwml/luci-app-mosdns" >> feeds.conf.default
          echo "src-git openclash https://github.com/vernesong/OpenClash" >> feeds.conf.default
          echo "src-git lucky https://github.com/gdy666/luci-app-lucky" >> feeds.conf.default
          
          # 1. 初始更新
          ./scripts/feeds update -a 
          
          # 【修复1】替换 Golang 为 1.26 超前版本
          rm -rf feeds/packages/lang/golang
          git clone https://github.com/kenzok8/golang -b 1.26 feeds/packages/lang/golang
          
          # 【修复2】引入预编译的 Node.js，跳过源码编译噩梦
          rm -rf feeds/packages/lang/node
          git clone https://github.com/sbwml/feeds_packages_lang_node-prebuilt feeds/packages/lang/node
          
          # 2. 关键：替换后必须重新 update 并强制 install 以注册 host 依赖
          ./scripts/feeds update packages
          ./scripts/feeds install -p packages -f golang node
          ./scripts/feeds install -p mosdns -f luci-app-mosdns mosdns
          ./scripts/feeds install -p helloworld -f xray-core
          
          # 3. 批量安装剩余包
          ./scripts/feeds install -a
          
          # 【完美修复】将网易云与主题直接放入 package 目录以获得最高优先级
          git clone https://github.com/UnblockNeteaseMusic/luci-app-unblockneteasemusic package/luci-app-unblockneteasemusic
          git clone https://github.com/papagaye744/luci-theme-design package/luci-theme-design

      - name: 复制设备配置
        run: |
          cp configs/${DEVICE}.config openwrt/.config

      - name: 自动适配 WiFi 驱动
        run: |
          bash .github/scripts/auto_wifi.sh openwrt/.config $DEVICE

      - name: 自动适配网络加速
        run: |
          bash .github/scripts/auto_turboacc.sh openwrt/.config $DEVICE


      - name: 修复 京东云设备 (AX6600 / AX1800) 缺少 factory 固件问题
        if: matrix.id == 'ax6600' || matrix.id == 'jdc_ax1800'
        working-directory: openwrt
        run: |
          # 建立 matrix.id 到源码设备 ID 的映射
          case "${{ matrix.id }}" in
            "ax6600") TARGET_ID="jdcloud_re-cs-02" ;;
            "jdc_ax1800") TARGET_ID="jdcloud_re-ss-01" ;;
          esac
          
          echo "正在为 ${TARGET_ID} 修复 factory.bin 生成配置..."
          
          if [ -f "target/linux/qualcommax/image/ipq60xx.mk" ]; then
            # 修正：京东云 AX6600/AX1800 是 eMMC 设备，不能使用 append-ubi (NAND)，改用 Device/EmmcImage
            awk -v tid="${TARGET_ID}" '$0 ~ "define Device/"tid {flag=1} /DEVICE_PACKAGES/{if(flag) {print; print "\t$(call Device/EmmcImage)"; print "\tIMAGE/factory.bin := append-kernel | pad-to $$(KERNEL_SIZE) | append-rootfs | append-metadata"; flag=0; next}} 1' target/linux/qualcommax/image/ipq60xx.mk > temp.mk && mv temp.mk target/linux/qualcommax/image/ipq60xx.mk
          fi

      - name: 注入全局初始化脚本
        working-directory: openwrt
        run: |
          mkdir -p package/base-files/files/etc/uci-defaults
          # 设置 LuCI 默认语言为简体中文
          cp $GITHUB_WORKSPACE/.github/scripts/99-default-lang package/base-files/files/etc/uci-defaults/99-default-lang
          chmod +x package/base-files/files/etc/uci-defaults/99-default-lang

      - name: 补全中文翻译包
        working-directory: openwrt
        run: |
          echo "=== 自动为所有 luci-app 添加中文翻译包 ==="
          # 读取 .config 中所有已选中的 luci-app，自动追加对应的 i18n 包
          grep -oP 'CONFIG_PACKAGE_luci-app-\K[^=]+' .config | while read app; do
            i18n_key="CONFIG_PACKAGE_luci-i18n-${app}-zh-cn"
            if ! grep -q "${i18n_key}=y" .config; then
              echo "${i18n_key}=y" >> .config
              echo "  + 追加: luci-i18n-${app}-zh-cn"
            fi
          done

      - name: 生成最终配置
        working-directory: openwrt
        run: |
          # 显式声明非交互模式
          make defconfig


      - name: 下载依赖
        working-directory: openwrt
        run: |
          rm -rf dl/go-mod-cache
          make download -j8 || make download -j1 V=s
          find dl -size -1024c -exec rm -f {} \;
          
      - name: 预编译关键软件
        working-directory: openwrt
        run: |
          echo "=== 1. 编译基础环境工具 ==="
          make tools/compile -j$(nproc)
          make toolchain/compile -j$(nproc)
          
          echo "=== 2. 预编译核心插件 ==="
          # 注意：node 预编译包名为 node，但在 feeds 中路径可能不同
          # 使用 || true 是为了防止预编译失败导致整个构建停止，主编译阶段会再次尝试
          make package/feeds/packages/node/compile -j1 V=s || true
          make package/feeds/mosdns/mosdns/compile -j1 V=s
          make package/feeds/helloworld/xray-core/compile -j1 V=s
          
      - name: 编译固件
        working-directory: openwrt
        run: |
          echo "开始多线程编译..."
          make -j$(nproc) > build.log 2>&1 || {
            echo "❌ 多线程编译失败，正在尝试单线程容错编译..."
            make -j1 V=s >> build.log 2>&1 || {
              echo "❌ 单线程编译也失败了！"
              echo "==================== 最后的 500 行报错日志 ===================="
              tail -n 500 build.log
              exit 1
            }
          }
          echo "✅ 编译成功！"

      - name: 打包固件
        run: |
          mkdir -p artifact/${DEVICE}
          cp -rf openwrt/bin/targets/*/* artifact/${DEVICE}/
          find artifact/${DEVICE}/ -name "*.ipk" -o -name "*.apk" -delete
          rm -rf artifact/${DEVICE}/packages

      - name: 解析构建日志
        working-directory: openwrt
        run: |
          bash $GITHUB_WORKSPACE/.github/scripts/parse_build_log.sh \
            build.log \
            $GITHUB_WORKSPACE/artifact/${DEVICE}/build_info.txt

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.id }}_firmware
          path: artifact/${{ matrix.id }}/

      - name: 清理旧 Release
        if: github.ref == 'refs/heads/main'
        run: bash .github/scripts/cleanup_releases.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 清理旧构建产物
        run: bash .github/scripts/cleanup_artifacts.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 触发自动发布 Release
        if: success()
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/release.yml/dispatches \
            -d '{"ref":"main","inputs":{"device":"${{ matrix.id }}","device_name":"${{ matrix.name }}","run_id":"${{ github.run_id }}"}}'
