name: 自动发布设备固件

on:
  workflow_dispatch:
    inputs:
      device:
        description: "选择要发布的设备"
        required: true
        type: choice
        options:
          - n5105
          - wyse3040
          - mt7621
          - r619ac
          - ax6600
          - jdc_ax1800
      run_id:
        description: "构建工作流的 Run ID（自动触发时传入）"
        required: true
        type: string

permissions:
  contents: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-22.04
    env:
      DEVICE: ${{ inputs.device }}

    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.DEVICE }}_firmware
          path: firmware/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.run_id }}

      - name: 读取构建信息
        id: info
        run: |
          INFO_FILE="firmware/build_info.txt"
          if [ -f "$INFO_FILE" ]; then
            # 添加了 tr -d '\r' 来强制清理可能存在的 Windows 换行符
            VERSION=$(grep "固件版本" "$INFO_FILE" | sed 's/固件版本: //' | tr -d '\r' || true)
            KERNEL=$(grep "内核版本" "$INFO_FILE" | sed 's/内核版本: //' | tr -d '\r' || true)
            TARGET=$(grep "目标平台" "$INFO_FILE" | sed 's/目标平台: //' | tr -d '\r' || true)
            DATE=$(grep "构建时间" "$INFO_FILE" | sed 's/构建时间: //' | tr -d '\r' || true)
          fi
          echo "version=${VERSION:-未知}" >> $GITHUB_OUTPUT
          echo "kernel=${KERNEL:-未知}" >> $GITHUB_OUTPUT
          echo "target=${TARGET:-未知}" >> $GITHUB_OUTPUT
          echo "date=${DATE:-$(date +%Y-%m-%d)}" >> $GITHUB_OUTPUT

      - name: 生成 tag 和 Release 名称
        id: vars
        run: |
          RAW_TAG="${DEVICE}-${{ steps.info.outputs.date }}"
          
          # 关键修复：将空格和冒号替换为连字符，并删除任何残留的换行/回车符
          TAG=$(echo "$RAW_TAG" | tr ' :' '-' | tr -d '\r\n')
          
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          
          # Release 名称可以包含空格，所以这里不做限制
          echo "name=固件发布 - ${DEVICE} - ${{ steps.info.outputs.date }}" >> $GITHUB_OUTPUT

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.name }}
          make_latest: true
          prerelease: false
          body: |
            ## 📦 设备：${{ env.DEVICE }}

            ### 🔧 构建信息
            - 固件版本：${{ steps.info.outputs.version }}
            - 内核版本：${{ steps.info.outputs.kernel }}
            - 目标平台：${{ steps.info.outputs.target }}
            - 构建时间：${{ steps.info.outputs.date }}

            ### 📁 包含内容
            - 固件文件
            - build_info.txt
            - manifest / buildinfo

          files: |
            firmware/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
